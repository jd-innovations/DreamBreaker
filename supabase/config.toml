# Supabase project configuration — DreamBreaker PB
# https://supabase.com/docs/reference/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "5MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

[auth.external.google]
enabled = true
# Set via environment: SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID / SECRET

[auth.external.apple]
enabled = true
# Set via environment: SUPABASE_AUTH_EXTERNAL_APPLE_CLIENT_ID / SECRET

[realtime]
enabled = true

[edge_runtime]
enabled = true

# Storage buckets — provisioned by migration or dashboard
# tournament-covers: public read, 5MB max, images only
# player-avatars:    public read, 2MB max, images only
